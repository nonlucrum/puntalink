<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nuevo Proyecto - PuntaLink</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body class="project-body">
  <main>
    <section class="card-project">
      <h1>Configuración de Proyecto</h1>
        <div class="togglebar">
          <button id="toggleBackG" class="togglebg"></button>
          <button id="btnCreateNewProject" class="togglebtn">Crear Proyecto</button>
          <button id="btnLoadOldProject" class="togglebtn--ghost"> Cargar Proyecto</button>
        </div>
      <form id="formNuevoProyecto" autocomplete="off">
        <div class="form-group">
          <label for="nombreProyecto">Nombre del proyecto</label>
          <input type="text" id="nombreProyecto" name="nombreProyecto" required />
        </div>
        
        <div class="form-group">
          <label for="empresaConstructora">Empresa constructora</label>
          <input type="text" id="empresaConstructora" name="empresaConstructora" required />
        </div>
        
        <div class="form-group">
          <label>Tipo de fundación (muerto)</label>
          <div class="radio-group">
            <div class="radio-option">
              <input type="radio" id="cilindro" name="tipoMuerto" value="Cilindrico" checked />
              <label for="cilindro">Cilíndrico</label>
            </div>
            <div class="radio-option">
              <input type="radio" id="triangulo" name="tipoMuerto" value="Triangular" />
              <label for="triangulo">Triangular</label>
            </div>
            <div class="radio-option">
              <input type="radio" id="corrido" name="tipoMuerto" value="Corrido" />
              <label for="corrido">Corrido</label>
            </div>
          </div>
        </div>
        
        <div class="form-group">
          <label for="velViento">Velocidad del viento (km/h)</label>
          <input type="number" id="velViento" name="velViento" step="0.1" required />
        </div>
        
        <div class="form-group">
          <label for="tempPromedio">Temperatura promedio (°C)</label>
          <input type="number" id="tempPromedio" name="tempPromedio" step="0.1" required />
        </div>
        
        <div class="form-group">
          <label for="presionAtm">Presión atmosférica (mmHg)</label>
          <input type="number" id="presionAtm" name="presionAtm" step="0.1" required />
        </div>
        
        <div class="actions">
          <button id="btnProjectSubmit" class="btn-primary">Crear Proyecto</button>
        </div>
      </form>
      <div id="projectList" class="project-list" style="display:none">
        <button class="project-card">
            <div class="project-card-title">
                <h3>Proyecto Génesis</h3>
                <h4>Puntalink</h4>
            </div>
            <span class="project-card-info"></span>
        </button>
      </div>
      <script type="module" src="script.js"></script>
    </section>
  </main>
</body>
</html>
