<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Configuración de Proyecto</title>

  <!-- Tus estilos globales -->
  <link rel="stylesheet" href="styles.css"/>

  <!-- SDK de Google Identity Services (ya lo usabas) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Estilos mínimos para el slideshow (puedes moverlos a styles.css si prefieres) -->
  <style>
    /* ===== Fondo con cross-fade ===== */
    .bg-slideshow{
      position: fixed;
      left: 0; top: 0;
      width: 100vw; height: 100vh;
      z-index: 0; /* detrás del contenido */
      pointer-events: none;
      overflow: hidden;
    }
    .bg-slideshow .bg-layer{
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.8s ease; /* transición lenta */
      will-change: opacity;
    }
    .bg-slideshow .bg-layer.is-visible{ opacity: 1; }

    /* Asegura que el contenido quede por encima del fondo */
    .app-main{ position: relative; z-index: 1; }

    /* Overlay para legibilidad; si te oscurece mucho, puedes quitarlo */
    .bg-slideshow::after{
      content:"";
      position:absolute;
      inset:0;
      background: linear-gradient(180deg, rgba(0,0,0,.20), rgba(0,0,0,.40));
    }
  </style>
</head>

<body class="project-body">
  <!-- Fondo: slideshow (nuevo, primer hijo del body) -->
  <div id="bg-slideshow" class="bg-slideshow" aria-hidden="true"></div>

  <!-- Contenido -->
  <main class="app-main">
    <!-- ===== Pantalla de Login con Grúa ===== -->
    <div id="loginScreen" class="login-screen-crane">
      <!-- Grúa de construcción interactiva -->
      <div class="crane-container">
        <svg class="crane" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
          <!-- Base de la grúa -->
          <g class="crane__base">
            <rect x="160" y="450" width="80" height="50" rx="5"/>
            <rect x="170" y="440" width="60" height="15" rx="3"/>
          </g>
          
          <!-- Torre principal -->
          <g class="crane__tower">
            <rect x="185" y="200" width="30" height="250" rx="2"/>
            <!-- Secciones de la torre -->
            <line x1="185" y1="230" x2="215" y2="230" stroke-width="2"/>
            <line x1="185" y1="270" x2="215" y2="270" stroke-width="2"/>
            <line x1="185" y1="310" x2="215" y2="310" stroke-width="2"/>
            <line x1="185" y1="350" x2="215" y2="350" stroke-width="2"/>
            <line x1="185" y1="390" x2="215" y2="390" stroke-width="2"/>
          </g>
          
          <!-- Brazo de la grúa -->
          <g class="crane__arm">
            <rect x="215" y="195" width="140" height="12" rx="2"/>
            <rect x="90" y="195" width="95" height="12" rx="2"/>
            <!-- Contrabalance -->
            <rect x="50" y="207" width="40" height="30" rx="3"/>
          </g>
          
          <!-- Cabina -->
          <g class="crane__cabin">
            <rect x="175" y="170" width="50" height="30" rx="5"/>
            <rect x="180" y="175" width="18" height="20" rx="2" class="crane__window"/>
            <rect x="207" y="175" width="18" height="20" rx="2" class="crane__window"/>
          </g>
          
          <!-- Cable y gancho -->
          <g class="crane__hook-system" id="craneHook">
            <line x1="320" y1="207" x2="320" y2="280" stroke-width="3" class="crane__cable"/>
            <g class="crane__hook" transform="translate(320, 280)">
              <path d="M -10 0 L 10 0 L 10 15 Q 10 25, 0 25 Q -10 25, -10 15 L -10 0" class="hook-shape"/>
              <circle cx="0" cy="-8" r="8" class="hook-pulley"/>
            </g>
          </g>
          
          <!-- Luces de señalización -->
          <circle cx="200" cy="165" r="5" class="crane__light crane__light--left"/>
          <circle cx="200" cy="445" r="4" class="crane__light crane__light--base"/>
          
          <!-- Panel de control interactivo -->
          <g class="crane__control-panel" id="controlPanel">
            <rect x="165" y="420" width="70" height="20" rx="3" class="control-bg"/>
            <circle cx="180" cy="430" r="4" class="control-button"/>
            <circle cx="200" cy="430" r="4" class="control-button control-button--main"/>
            <circle cx="220" cy="430" r="4" class="control-button"/>
          </g>
        </svg>
        
        <!-- Botón de activación -->
        <div class="crane-button" id="craneActivate">
          <div class="button-text">ACTIVAR GRÚA</div>
        </div>
      </div>

      <!-- Formulario de Login -->
      <div class="login-form" id="loginForm">
        <h2 class="form-title">¡Bienvenido!</h2>
        <p class="form-subtitle">Sistema de Análisis Estructural</p>
        
        <!-- Carga del cliente y callback de Google -->
        <div id="g_id_onload"
          data-client_id="263905342858-atfen47bui228gtv1eckq6o1fnfgg5rf.apps.googleusercontent.com"
          data-callback="onGoogleCredential"
          data-auto_prompt="false">
        </div>

        <!-- Botón de Google -->
        <div class="google-signin-wrapper">
          <div class="g_id_signin"
            data-type="standard"
            data-size="large"
            data-theme="filled_black"
            data-text="signin_with"
            data-shape="rectangular"
            data-logo_alignment="left">
          </div>
        </div>
        
        <p class="login-hint">Activa la grúa para comenzar</p>
      </div>
    </div>
    <!-- ===== /Pantalla de Login con Grúa ===== -->

    <!-- ===== Contenido Principal (solo visible cuando hay sesión) ===== -->
    <section id="mainContent" class="main-content-wrapper" style="display:none;">
      <!-- Header con info de usuario -->
      <div class="user-header">
        <div class="header-content">
          <div class="brand-section">
            <div class="brand-logo">
              <img src="img/backgrounds/13.png" alt="PuntaLink Logo" />
            </div>
            <div class="brand-text">
              <h2 class="brand-title">PuntaLink</h2>
              <p class="brand-subtitle">Configuración de Proyecto</p>
            </div>
          </div>
          
          <div id="userInfo" class="user-info-section" style="display:none;">
            <img id="userPic" alt="avatar" class="user-avatar" referrerPolicy="no-referrer"/>
            <span id="userEmail" class="user-email"></span>
            <button id="btnLogout" class="btn-logout" type="button">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 14H3C2.44772 14 2 13.5523 2 13V3C2 2.44772 2.44772 2 3 2H6M11 11L14 8M14 8L11 5M14 8H6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Cerrar sesión
            </button>
          </div>
        </div>
      </div>

      <!-- Contenido de proyecto -->
      <div id="projectContent" class="project-content-container">
        <div class="project-tabs">
          <button id="btnCreateNewProject" class="tab-button active">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M10 4V16M4 10H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Crear Proyecto
          </button>
          <button id="btnLoadOldProject" class="tab-button">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 7C4 5.89543 4.89543 5 6 5H14C15.1046 5 16 5.89543 16 7V15C16 16.1046 15.1046 17 14 17H6C4.89543 17 4 16.1046 4 15V7Z" stroke="currentColor" stroke-width="2"/>
              <path d="M8 3H12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Cargar Proyecto
          </button>
          <div class="background-menu-wrapper">
            <button id="toggleBackG" class="tab-button tab-button--icon" title="Opciones de Fondo">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="2" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2"/>
                <path d="M2 14L6 10L9 13L14 8L18 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="14" cy="6" r="1.5" fill="currentColor"/>
              </svg>
            </button>
            <div id="backgroundMenu" class="background-dropdown">
              <button type="button" class="bg-option" id="bgToggleVisibility">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M2.5 7.5L10 2.5L17.5 7.5M2.5 12.5L10 17.5L17.5 12.5M10 2.5V7.5M10 12.5V17.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Mostrar/Ocultar Fondo</span>
              </button>
              <button type="button" class="bg-option" id="bgUploadCustom">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M10 14V4M10 4L6 8M10 4L14 8M4 17H16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Cargar Imagen Personalizada formato PNG</span>
              </button>
              <button type="button" class="bg-option" id="bgResetDefault">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M4 10C4 6.68629 6.68629 4 10 4C13.3137 4 16 6.68629 16 10C16 13.3137 13.3137 16 10 16M4 10L2 8M4 10L6 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Restaurar Fondo Original</span>
              </button>
            </div>
            <input type="file" id="customBackgroundInput" accept="image/*" style="display:none;" />
          </div>
        </div>

        <form id="formNuevoProyecto" class="modern-form" autocomplete="off">
          <div class="form-section">
            <h3 class="section-title">
              <span class="section-icon">📋</span>
              Información General
            </h3>
            
            <div class="form-grid">
              <div class="form-group modern">
                <label for="nombreProyecto">Nombre del proyecto</label>
                <input type="text" id="nombreProyecto" name="nombreProyecto" placeholder="Ej: Parque Solar Los Molinos" required />
              </div>

              <div class="form-group modern">
                <label for="empresaConstructora">Empresa constructora</label>
                <input type="text" id="empresaConstructora" name="empresaConstructora" placeholder="Ej: Constructora ABC S.A." required />
              </div>
              
              <div class="form-group modern">
                <label for="ubicacionProyecto">Ubicación</label>
                <input type="text" id="ubicacionProyecto" name="ubicacionProyecto" placeholder="Ej: Valdivia, Chile" required />
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="section-title">
              <span class="section-icon">🏗️</span>
              Tipo de Fundación
            </h3>
            
            <div class="form-group modern">
              <label>Tipo de fundación (muerto)</label>
              <div class="radio-group-modern">
                <div class="radio-card">
                  <input type="radio" id="cilindro" name="tipoMuerto" value="Cilindrico" checked />
                  <label for="cilindro">
                    <div class="radio-icon">⭕</div>
                    <div class="radio-text">
                      <span class="radio-title">Aislado Cilíndrico</span>
                      <span class="radio-desc">Fundación circular individual</span>
                    </div>
                  </label>
                </div>
                <div class="radio-card">
                  <input type="radio" id="triangulo" name="tipoMuerto" value="Triangular" />
                  <label for="triangulo">
                    <div class="radio-icon">🔺</div>
                    <div class="radio-text">
                      <span class="radio-title">Corrido Triangular</span>
                      <span class="radio-desc">Fundación continua triangular</span>
                    </div>
                  </label>
                </div>
                <div class="radio-card">
                  <input type="radio" id="corrido" name="tipoMuerto" value="Corrido" />
                  <label for="corrido">
                    <div class="radio-icon">▭</div>
                    <div class="radio-text">
                      <span class="radio-title">Corrido Rectangular</span>
                      <span class="radio-desc">Fundación continua rectangular</span>
                    </div>
                  </label>
                </div>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3 class="section-title">
              <span class="section-icon">🌤️</span>
              Condiciones Ambientales
            </h3>
            
            <div class="form-grid three-cols">
              <div class="form-group modern">
                <label for="velViento">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 5H9C10.1046 5 11 5.89543 11 7C11 8.10457 10.1046 9 9 9H2M2 11H11C12.1046 11 13 10.1046 13 9C13 7.89543 12.1046 7 11 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                  </svg>
                  Velocidad del viento
                </label>
                <div class="input-with-unit">
                  <input type="number" id="velViento" name="velViento" step="0.1" placeholder="120" required />
                  <span class="input-unit">km/h</span>
                </div>
              </div>

              <div class="form-group modern">
                <label for="tempPromedio">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 11V4M8 11C6.89543 11 6 11.8954 6 13C6 14.1046 6.89543 15 8 15C9.10457 15 10 14.1046 10 13C10 11.8954 9.10457 11 8 11Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                  </svg>
                  Temperatura promedio
                </label>
                <div class="input-with-unit">
                  <input type="number" id="tempPromedio" name="tempPromedio" step="0.1" placeholder="25" required />
                  <span class="input-unit">°C</span>
                </div>
              </div>

              <div class="form-group modern">
                <label for="presionAtm">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M8 5V8L10 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                  </svg>
                  Presión atmosférica
                </label>
                <div class="input-with-unit">
                  <input type="number" id="presionAtm" name="presionAtm" step="0.1" placeholder="760" required />
                  <span class="input-unit">mmHg</span>
                </div>
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button id="btnProjectSubmit" class="btn-submit" type="submit">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M16 10L12 6M16 10L12 14M16 10H4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Crear Proyecto
            </button>
          </div>
        </form>

        <div id="projectList" class="project-list" style="display:none"></div>
      </div>
    </section>

      <!-- Callback global que invoca Google; delega al handler que define script.js -->
      <script>
        function onGoogleCredential(resp) {
          if (window.__gisCredentialHandler) {
            window.__gisCredentialHandler(resp);
          } else {
            console.error('Handler de GIS no inicializado');
          }
        }
      </script>

      <!-- Tu bundle actual (no se toca) -->
      <script type="module" src="script.js"></script>
    </section>
  </main>
</body>
</html>
