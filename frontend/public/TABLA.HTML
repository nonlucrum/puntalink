<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tabla de Armado</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
  }

  .table-container {
    overflow-x: auto;
  }

  table {
    border-collapse: collapse;
    width: 100%;
    text-align: center;
  }

  th, td {
    border: 1px solid #000;
    padding: 6px;
    font-size: 13px;
  }

  /* Color de fondo del encabezado principal */
  thead th {
    background-color: #00a8ff;
    color: black;
    font-weight: bold;
  }

  /* Sub-encabezados más claros */
  thead tr:nth-child(3) th {
    background-color: #f3f9ff;
    color: #000;
  }

  h3 {
    color: #0077b6;
    margin-bottom: 10px;
  }
</style>
</head>
<body>

<h3>📋 Tabla de Armado por Muerto</h3>
<div class="table-container">
  <table>
    <thead>
      <tr>
        <th colspan="6">DEADMAN</th>
        <th colspan="4">Acero</th>
        <th colspan="2">Concreto</th>
        <th colspan="2">Alambre</th>
      </tr>
      <tr>
        <th rowspan="2">#</th>
        <th rowspan="2">Eje</th>
        <th rowspan="2">Muros</th>
        <th rowspan="1">Largo</th>
        <th rowspan="1">Alto</th>
        <th rowspan="1">Ancho</th>

        <th rowspan="2">#</th>
        <th rowspan="1">Longitud</th>
        <th rowspan="1">Peso</th>
        <th rowspan="1">Dirección</th>
        <th rowspan="1">Vol</th>
        <th rowspan="1">Peso</th>
        <th rowspan="1">Longitud</th>
        <th rowspan="1">Peso</th>
      </tr>
      <tr>
        <th>m</th>
        <th>m</th>
        <th>m</th>
        
        <th>m</th>
        <th>kg</th>
        <th>***</th>
        <th>m³</th>
        <th>ton</th>
        <th>m</th>
        <th>kg</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1</td><td>E1</td><td>M1</td>
        <td>2.5</td><td>1.2</td><td>0.8</td>
        <td>4</td><td>11.0</td><td>1.3</td>
        <td>Long</td><td>2.9</td><td>0.03</td><td>0.12</td><td>0.07</td>
      </tr>
      <tr>
        <td>2</td><td>E2</td><td>M2</td>
        <td>3.0</td><td>1.5</td><td>1.0</td>
        <td>6</td><td>13.2</td><td>1.5</td>
        <td>Trans</td><td>3.2</td><td>0.05</td><td>0.15</td><td>0.07</td>
      </tr>
    </tbody>
    <tfoot>
      <tr style="font-weight:bold; background-color:#e0f7ff;">
        <td colspan="3">Totales</td>
        <td colspan="3"></td>
        <td>10</td><td>24.2</td><td></td>
        <td>2.8</td><td>6.1</td><td>0.08</td><td>0.27</td><td>0.14</td>
      </tr>
    </tfoot>
  </table>
</div>

</body>
</html>
